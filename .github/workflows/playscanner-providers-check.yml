name: PLAYScanner Providers Check

on:
  schedule:
    - cron: '0 8 * * *' # Daily drift + health check at 08:00 UTC
    - cron: '0 */6 * * *' # Health check every 6h (see job filter below)
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/lib/playscanner/providers.json'
      - 'src/app/api/playscanner/redirect/route.ts'
      - 'lambda-playscanner/src/providers/**'
      - 'lambda-openactive/src/**'
      - 'scripts/check-playscanner-providers-drift.mjs'
      - 'scripts/check-playscanner-providers-health.mjs'
      - '.github/workflows/playscanner-providers-check.yml'

permissions:
  contents: read

concurrency:
  group: playscanner-providers-${{ github.ref }}-${{ github.event.schedule || 'dispatch' }}
  cancel-in-progress: true

jobs:
  drift-check:
    # Drift check only needs to run daily or on PR — not every 6h.
    if: github.event.schedule != '0 */6 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install minimal deps
        run: npm install --no-save @supabase/supabase-js@^2.50.0

      - name: Run drift check (unknown-provider detector)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/check-playscanner-providers-drift.mjs

  health-check:
    # Health check runs on every trigger, including the 6h cron.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install minimal deps
        run: npm install --no-save @supabase/supabase-js@^2.50.0

      - name: Run health check (zero-slot detector)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/check-playscanner-providers-health.mjs
