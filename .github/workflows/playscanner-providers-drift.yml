name: PLAYScanner Providers Drift Check

on:
  schedule:
    - cron: '0 8 * * *' # Daily at 08:00 UTC, well after the morning collection cycle
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/lib/playscanner/providers.json'
      - 'src/app/api/playscanner/redirect/route.ts'
      - 'lambda-playscanner/src/providers/**'
      - 'lambda-openactive/src/**'
      - 'scripts/check-playscanner-providers-drift.mjs'
      - '.github/workflows/playscanner-providers-drift.yml'

permissions:
  contents: read

concurrency:
  group: drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install minimal deps
        run: npm install --no-save @supabase/supabase-js@^2.50.0

      - name: Run drift check
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/check-playscanner-providers-drift.mjs
